env:
  TERM: xterm-256color

window:
  padding:
    x: 15
    y: 8

  dynamic_padding: false

  decorations: none

  title: Alacritty

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 5000

# Font configuration
font:
  normal:
    family: MesloLGS NF

    style: Regular

  bold:
    family: MesloLGS NF

    style: Bold

  italic:
    family: MesloLGS NF

    style: Italic

  bold_italic:
    family: MesloLGS NF

    style: Bold Italic

  size: 13.0

  offset:
    x: 0
    y: 1

draw_bold_text_with_bright_colors: true

import:
    - /home/chetj/.config/alacritty/dracula.yml

background_opacity: 0.9

