env:
  TERM: xterm-256color

window:
  padding:
    x: 30
    y: 15

  dynamic_padding: false

  decorations: none

  title: Alacritty

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 5000

# Font configuration
font:
  normal:
    family: UbuntuMono Nerd Font

    style: Regular

  bold:
    family: UbuntuMono Nerd Font

    style: Bold

  italic:
    family: UbuntuMono Nerd Font

    style: Italic

  bold_italic:
    family: UbuntuMono Nerd Font

    style: Bold Italic

  size: 12.0

  offset:
    x: 0
    y: 0

draw_bold_text_with_bright_colors: true

import:
  - /home/chetjones/.config/alacritty/popos.yml

background_opacity: 0.95
